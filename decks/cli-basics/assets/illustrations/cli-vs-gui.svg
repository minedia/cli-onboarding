<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" font-family="'Noto Sans JP', sans-serif">
  <!-- ===== Left: GUI ===== -->
  <g>
    <!-- screen frame -->
    <rect x="40" y="40" width="320" height="200" fill="#F2F2F2" stroke="#D1D1D1" stroke-width="2" rx="4"/>
    <!-- title bar -->
    <rect x="40" y="40" width="320" height="22" fill="#E6E6E6"/>
    <circle cx="56" cy="51" r="3.5" fill="#EC3737"/>
    <circle cx="70" cy="51" r="3.5" fill="#F5AA77"/>
    <circle cx="84" cy="51" r="3.5" fill="#959595"/>
    <!-- buttons -->
    <rect x="68" y="86" width="60" height="32" fill="#FFFFFF" stroke="#959595" rx="3"/>
    <text x="98" y="107" font-size="11" fill="#4D4D4D" text-anchor="middle">編集</text>
    <rect x="138" y="86" width="60" height="32" fill="#FFFFFF" stroke="#959595" rx="3"/>
    <text x="168" y="107" font-size="11" fill="#4D4D4D" text-anchor="middle">削除</text>
    <rect x="208" y="86" width="60" height="32" fill="#FFFFFF" stroke="#959595" rx="3"/>
    <text x="238" y="107" font-size="11" fill="#4D4D4D" text-anchor="middle">保存</text>
    <rect x="68" y="130" width="200" height="32" fill="#FFFFFF" stroke="#959595" rx="3"/>
    <text x="168" y="151" font-size="11" fill="#4D4D4D" text-anchor="middle">ファイルを選択</text>
    <rect x="68" y="174" width="200" height="32" fill="#FFFFFF" stroke="#959595" rx="3"/>
    <text x="168" y="195" font-size="11" fill="#4D4D4D" text-anchor="middle">ファイルを選択</text>
    <!-- arrow cursor -->
    <g transform="translate(290,168) rotate(-25)">
      <path d="M0,0 L0,28 L7,22 L11,30 L14,28 L10,20 L18,18 Z" fill="#3C3C3C" stroke="#FFFFFF" stroke-width="1.5"/>
    </g>
    <!-- label -->
    <text x="200" y="265" font-size="20" font-weight="700" fill="#3C3C3C" text-anchor="middle">GUI</text>
    <text x="200" y="287" font-size="11" fill="#6C6C6C" text-anchor="middle" font-family="'Sometype Mono', monospace" letter-spacing="0.05em">POINT &amp; CLICK</text>
  </g>

  <!-- ===== Divider ===== -->
  <text x="440" y="145" font-size="20" font-weight="600" fill="#D1D1D1" text-anchor="middle" font-family="'Sometype Mono', monospace">vs</text>

  <!-- ===== Right: CLI ===== -->
  <g transform="translate(480,0)">
    <!-- terminal frame -->
    <rect x="40" y="40" width="320" height="200" fill="#1A1A1A" stroke="#3C3C3C" stroke-width="2" rx="4"/>
    <rect x="40" y="40" width="320" height="22" fill="#3C3C3C"/>
    <circle cx="56" cy="51" r="3.5" fill="#EC3737"/>
    <circle cx="70" cy="51" r="3.5" fill="#F5AA77"/>
    <circle cx="84" cy="51" r="3.5" fill="#959595"/>
    <!-- prompt content -->
    <g font-family="'Sometype Mono', monospace">
      <text x="58" y="92" font-size="14" fill="#F5AA77">$</text>
      <text x="76" y="92" font-size="14" fill="#FFFFFF">ls -la</text>
      <text x="58" y="115" font-size="11" fill="#959595">total 248</text>
      <text x="58" y="135" font-size="11" fill="#D1D1D1">-rw-r--r--  memo.txt</text>
      <text x="58" y="155" font-size="11" fill="#D1D1D1">-rw-r--r--  data.csv</text>
      <text x="58" y="175" font-size="11" fill="#D1D1D1">-rw-r--r--  task.txt</text>
      <text x="58" y="195" font-size="11" fill="#D1D1D1">-rw-r--r--  notes.md</text>
      <text x="58" y="222" font-size="14" fill="#F5AA77">$</text>
      <rect x="78" y="212" width="9" height="14" fill="#F5AA77">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>
    <!-- label -->
    <text x="200" y="265" font-size="20" font-weight="700" fill="#3C3C3C" text-anchor="middle">CLI</text>
    <text x="200" y="287" font-size="11" fill="#6C6C6C" text-anchor="middle" font-family="'Sometype Mono', monospace" letter-spacing="0.05em">TYPE &amp; RUN</text>
  </g>
</svg>
