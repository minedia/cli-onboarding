name: Build slides and create release

on:
  push:
    branches: [main]
    paths:
      - 'decks/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'リリースバージョン（空なら直近タグのパッチを自動+1。例: v0.1.0）'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  discover:
    name: Discover decks
    runs-on: ubuntu-latest
    outputs:
      decks: ${{ steps.find.outputs.decks }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Find decks
        id: find
        run: |
          # decks/<slug>/slides.md を持つディレクトリの slug を JSON 配列で出力
          decks=$(find decks -mindepth 2 -maxdepth 2 -name slides.md -printf '%h\n' \
            | sed 's|decks/||' \
            | sort \
            | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "decks=$decks" >> "$GITHUB_OUTPUT"
          echo "発見したデッキ: $decks"

  build:
    name: Build ${{ matrix.deck }}
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        deck: ${{ fromJson(needs.discover.outputs.decks) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Noto fonts (Japanese)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      - name: Build PDF / PPTX / HTML
        working-directory: decks/${{ matrix.deck }}
        run: |
          # デッキごとの themes/ を丸ごと登録し、slides.md の frontmatter の
          # theme: で実テーマを選択する（デッキ別テーマに対応）。
          for fmt in pdf pptx html; do
            marp slides.md \
              --theme-set themes/ \
              --$fmt \
              --allow-local-files \
              -o "${{ matrix.deck }}-slides.$fmt"
          done

      - name: Verify outputs
        working-directory: decks/${{ matrix.deck }}
        run: |
          ls -la "${{ matrix.deck }}-slides.pdf"
          ls -la "${{ matrix.deck }}-slides.pptx"
          ls -la "${{ matrix.deck }}-slides.html"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deck-${{ matrix.deck }}-${{ github.sha }}
          path: |
            decks/${{ matrix.deck }}/${{ matrix.deck }}-slides.pdf
            decks/${{ matrix.deck }}/${{ matrix.deck }}-slides.pptx
            decks/${{ matrix.deck }}/${{ matrix.deck }}-slides.html
          retention-days: 30

  release:
    name: Auto tag & release
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all deck artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: deck-*-${{ github.sha }}
          path: dist
          merge-multiple: true

      - name: Show downloaded files
        run: ls -la dist/

      - name: Bundle all decks into a single zip
        run: |
          # 全デッキの成果物を1つの zip にまとめる（-j でパスを平坦化）
          zip -j cli-onboarding-slides.zip dist/*-slides.*
          echo "----- zip contents -----"
          unzip -l cli-onboarding-slides.zip

      - name: Compute next version
        id: meta
        env:
          OVERRIDE: ${{ github.event.inputs.version }}
        run: |
          git fetch --tags --force --quiet
          if [ -n "$OVERRIDE" ]; then
            NEXT="$OVERRIDE"
          else
            LATEST="$(git tag -l 'v*.*.*' | sort -V | tail -n1)"
            if [ -z "$LATEST" ]; then
              NEXT="v0.0.1"
            else
              ver="${LATEST#v}"
              MAJOR="${ver%%.*}"
              rest="${ver#*.}"
              MINOR="${rest%%.*}"
              PATCH="${rest#*.}"
              NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi
          fi
          DATE_JP="$(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "date_jp=$DATE_JP" >> "$GITHUB_OUTPUT"
          echo "次のリリース: $NEXT"

      - name: Generate release notes
        run: |
          {
            echo "**CLI オンボーディング登壇資料 ${{ steps.meta.outputs.version }}**"
            echo ""
            echo "- **リリース日時**: ${{ steps.meta.outputs.date_jp }}"
            echo "- **コミット**: [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})"
            echo "- **ワークフロー実行**: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""
            echo "## ダウンロード"
            echo ""
            echo "\`cli-onboarding-slides.zip\` に、全デッキのスライド（PDF / PPTX / HTML）を1セットで同梱しています。"
            echo ""
            echo "## 収録デッキ"
            echo ""
            for f in dist/*-slides.pdf; do
              [ -e "$f" ] || continue
              base="$(basename "$f" -slides.pdf)"
              echo "- **$base** — PDF / PPTX / HTML"
            done
          } > release-notes.md
          echo "----- release-notes.md -----"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.version }}
          body_path: release-notes.md
          files: cli-onboarding-slides.zip
          make_latest: true
          draft: false
          prerelease: false
