name: Build slides and create release

on:
  push:
    branches: [main]
    paths:
      - 'slides/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'リリースバージョン（空なら直近タグのパッチを自動+1。例: v0.1.0）'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build slides (PDF / PPTX / HTML)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Noto fonts (Japanese)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      - name: Build PDF
        working-directory: slides
        run: |
          marp slides.md \
            --theme themes/minedia.css \
            --pdf \
            --allow-local-files \
            -o cli-basics-slides.pdf

      - name: Build PPTX
        working-directory: slides
        run: |
          marp slides.md \
            --theme themes/minedia.css \
            --pptx \
            --allow-local-files \
            -o cli-basics-slides.pptx

      - name: Build HTML
        working-directory: slides
        run: |
          marp slides.md \
            --theme themes/minedia.css \
            --html \
            --allow-local-files \
            -o cli-basics-slides.html

      - name: Verify outputs
        run: |
          ls -la slides/cli-basics-slides.pdf
          ls -la slides/cli-basics-slides.pptx
          ls -la slides/cli-basics-slides.html

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: slides-${{ github.sha }}
          path: |
            slides/cli-basics-slides.pdf
            slides/cli-basics-slides.pptx
            slides/cli-basics-slides.html
          retention-days: 30

  release:
    name: Auto tag & release
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: slides-${{ github.sha }}
          path: dist

      - name: Show downloaded files
        run: ls -la dist/

      - name: Compute next version
        id: meta
        env:
          OVERRIDE: ${{ github.event.inputs.version }}
        run: |
          git fetch --tags --force --quiet
          if [ -n "$OVERRIDE" ]; then
            NEXT="$OVERRIDE"
          else
            LATEST="$(git tag -l 'v*.*.*' | sort -V | tail -n1)"
            if [ -z "$LATEST" ]; then
              NEXT="v0.0.1"
            else
              ver="${LATEST#v}"
              MAJOR="${ver%%.*}"
              rest="${ver#*.}"
              MINOR="${rest%%.*}"
              PATCH="${rest#*.}"
              NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi
          fi
          DATE_JP="$(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "date_jp=$DATE_JP" >> "$GITHUB_OUTPUT"
          echo "次のリリース: $NEXT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.version }}
          body: |
            **AI時代のコマンドライン入門 スライド ${{ steps.meta.outputs.version }}**

            - **リリース日時**: ${{ steps.meta.outputs.date_jp }}
            - **コミット**: [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            - **ワークフロー実行**: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ## ダウンロード

            - **`cli-basics-slides.pdf`** — PDF版（印刷・配布用）
            - **`cli-basics-slides.pptx`** — PowerPoint版（編集したい場合）
            - **`cli-basics-slides.html`** — ブラウザ版（最も忠実に表示される）
          files: |
            dist/cli-basics-slides.pdf
            dist/cli-basics-slides.pptx
            dist/cli-basics-slides.html
          make_latest: true
          draft: false
          prerelease: false
