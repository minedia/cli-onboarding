<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="'Sometype Mono', monospace">
  <defs>
    <linearGradient id="ciGradTree" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EC3737"/>
      <stop offset="100%" stop-color="#F5AA77"/>
    </linearGradient>
  </defs>

  <!-- Tree lines -->
  <g stroke="#D1D1D1" stroke-width="1.5" fill="none">
    <line x1="60" y1="40" x2="60" y2="120"/>
    <line x1="60" y1="120" x2="100" y2="120"/>
    <line x1="100" y1="120" x2="100" y2="180"/>
    <line x1="100" y1="180" x2="140" y2="180"/>
    <line x1="140" y1="180" x2="140" y2="320"/>
    <line x1="140" y1="240" x2="180" y2="240"/>
    <line x1="140" y1="280" x2="180" y2="280"/>
    <line x1="140" y1="320" x2="180" y2="320"/>
  </g>

  <!-- Nodes -->
  <g font-size="18" fill="#3C3C3C">
    <!-- root -->
    <text x="50" y="36" font-weight="700">/</text>
    <text x="80" y="36" font-size="11" fill="#959595">（ルート）</text>

    <!-- Users -->
    <text x="115" y="124" font-weight="500">Users/</text>

    <!-- yuki -->
    <text x="155" y="184">yuki/</text>

    <!-- subnodes -->
    <text x="195" y="244" fill="#6C6C6C">Desktop/</text>
    <text x="195" y="284" fill="#6C6C6C">Documents/</text>
    <text x="195" y="324" font-weight="700" fill="#3C3C3C">cli-handson/</text>
  </g>

  <!-- Annotation: ~ for home -->
  <g>
    <rect x="370" y="166" width="200" height="38" rx="3" fill="url(#ciGradTree)"/>
    <text x="470" y="190" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="'Noto Sans JP', sans-serif">ホーム ~（チルダ）</text>
    <!-- arrow to /Users/yuki -->
    <path d="M370,185 L235,185" stroke="#EC3737" stroke-width="2" fill="none"/>
    <polygon points="232,182 222,185 232,188" fill="#EC3737"/>
  </g>

  <!-- Annotation: current "." -->
  <g>
    <rect x="370" y="306" width="200" height="38" rx="3" fill="#3C3C3C"/>
    <text x="470" y="330" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="'Noto Sans JP', sans-serif">カレント .（今ここ）</text>
    <path d="M370,325 L300,325" stroke="#3C3C3C" stroke-width="2" fill="none"/>
    <polygon points="297,322 287,325 297,328" fill="#3C3C3C"/>
  </g>

  <!-- Absolute path example -->
  <g font-family="'Sometype Mono', monospace">
    <text x="50" y="365" font-size="12" fill="#959595">絶対パス: /Users/yuki/cli-handson</text>
  </g>
</svg>
